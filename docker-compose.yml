services:
  postgres:
    image: postgres:16-alpine
    container_name: dictionary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dictionary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dictionary123}
      POSTGRES_DB: ${POSTGRES_DB:-dictionary}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dictionary}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dictionary-net

  redis:
    image: redis:7-alpine
    container_name: dictionary-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dictionary-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dictionary-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dictionary}:${POSTGRES_PASSWORD:-dictionary123}@postgres:5432/${POSTGRES_DB:-dictionary}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key}
      API_PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dictionary-net

  front:
    build:
      context: .
      dockerfile: apps/front/Dockerfile
    container_name: dictionary-front
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - dictionary-net

volumes:
  postgres_data:
  redis_data:

networks:
  dictionary-net:
    driver: bridge
